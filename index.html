```html
<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Plan Mese · Theo & Dalia</title>
<style>
body { margin:0; font-family:Arial; background:#f5f0e8; }
canvas { display:block; }

header {
  background:#1a1410; color:white;
  padding:10px;
  display:flex; justify-content:space-between;
  font-size:14px;
}
</style>
</head>
<body>

<header>
  <div>Theo & Dalia</div>
  <div id="stats">0 mese | 0 invitați | 0 așezați | 0 liberi | 0 cazare</div>
</header>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let tables = [];
let guests = [];

const italianCities = [
"Roma","Milano","Firenze","Venezia","Napoli","Torino","Bologna","Verona",
"Pisa","Siena","Palermo","Catania","Bari","Como","Genova","Parma",
"Modena","Rimini","Trieste","Padova","Lucca","Perugia","Salerno","Matera",
"Ravenna","Lecce","Cagliari","Ancona","Aosta","Sorrento","Taormina","Alba"
];

function getItalianCity(i){
  return italianCities[i % italianCities.length];
}

// INIT
(function(){
  // masa mirilor stânga
  tables.push({name:"Dalia & Theo", x:150, y:canvas.height/2, miri:true});

  let startX = 400;
  let startY = 100;
  let gapX = 150;
  let gapY = 120;

  // top 4x4
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      tables.push({
        name:getItalianCity(tables.length),
        x:startX + c*gapX,
        y:startY + r*gapY
      });
    }
  }

  // bottom 4x4
  let offsetY = startY + 4*gapY + 200;

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      tables.push({
        name:getItalianCity(tables.length),
        x:startX + c*gapX,
        y:offsetY + r*gapY
      });
    }
  }
})();

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // scenă
  ctx.fillStyle="green";
  ctx.fillText("SCENĂ", canvas.width/2, 30);

  // bar
  ctx.fillStyle="brown";
  ctx.fillText("BAR", canvas.width/2, canvas.height-30);

  // ring
  ctx.beginPath();
  ctx.arc(canvas.width/2, canvas.height/2, 100, 0, Math.PI*2);
  ctx.stroke();

  tables.forEach(t=>{
    ctx.fillStyle = t.miri ? "gold" : "#ddd";
    ctx.fillRect(t.x, t.y, 100, 40);
    ctx.fillStyle="black";
    ctx.fillText(t.name, t.x+5, t.y+25);
  });

  updateStats();
}

function updateStats(){
  let mese = tables.length;
  let invitati = guests.length;
  let asezati = guests.filter(g=>g.seated).length;
  let liberi = invitati - asezati;
  let cazare = guests.filter(g=>g.cazare).length;

  document.getElementById("stats").innerText =
    `${mese} mese | ${invitati} invitați | ${asezati} așezați | ${liberi} liberi | ${cazare} cazare`;
}

draw();
</script>

</body>
</html>
```
